name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Setup Smurf
        uses: clouddrove/smurf@v1.1.0

      - name: Terraform Format Check
        run: smurf stf fmt --recursive --timeout 5s

      - name: Terraform Init
        run: smurf stf init

      - name: Terraform Validate
        run: smurf stf validate

  lint:
    name: Terraform Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Initialize TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: tflint --recursive -f compact

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          additional_args: --exclude-downloaded-modules --minimum-severity MEDIUM

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          skip_check: CKV_TF_1,CKV_TF_2

  docs:
    name: Terraform Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install terraform-docs
        uses: jaxxstorm/action-install-gh-release@v1
        with:
          repo: terraform-docs/terraform-docs

      - name: Verify README is up to date
        run: |
          if grep -q "BEGIN_TF_DOCS" README.md; then
            terraform-docs markdown table \
              --output-file README.md \
              --output-mode inject .

            if ! git diff --quiet README.md; then
              echo "::error::README.md is out of date."
              echo "Run the following command locally:"
              echo ""
              echo "terraform-docs markdown table --output-file README.md --output-mode inject ."
              echo ""
              echo "Then commit the updated README.md."
              git --no-pager diff README.md
              exit 1
            fi
          else
            echo "README.md does not contain a BEGIN_TF_DOCS block. Skipping documentation check."
          fi